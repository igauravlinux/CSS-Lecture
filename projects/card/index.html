<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>


<div class="grid-container">


    <div class="item item-1 heading">
        <h2>Which is Better?</h2>
    </div>


    <div class="item item-2 box-1">
        <h1>Delete Account ?</h1>

        <div class="alert">
            <i class="ri-alert-fill icon"></i>
            <p>
                Warning! This action is permanent and can not be undone.

            </p>
        </div>

        <div class="input-group">
                <label>Type "DELETE" to Confirm</label>
                <input type="text" value="DELETE">
        </div>

        <div class="btns">
            <button type="button" class="btn btn-1">Cancel</button>
            <button type="button" class="btn btn-2">Delete Account</button>
        </div>
            

    </div>




    <div class="item item-3 box-2">

        <span>
            <i class="ri-error-warning-line"></i>
        </span>
        
        <h1>Delete Account ?</h1>

        <p style="text-align: center;">Are you sure you want to delete your account?<br> This action is permanent and can not be undone.</p>

        <div class="btns">
            <button type="button" class="btn btn-1">Cancel</button>
            <button type="button" class="btn btn-2">Delete Account</button>
        </div>


    </div>
</div>



    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <div class="card">

        <div class="img-box">
            <img src="./girl.jpg" alt="image" height="100px">

            <div class="blur-effect">
                    
                <div class="name">
                    <h1>Tina Sharma</h1>
                    <i class='bx bxs-badge-check'></i>
                </div>

                <p class="summary">A Product Designer focused on intuitive user experiences</p>

                <div class="social">
                    <div class="first">
                        <i class='bx bx-user' style='color:#ffffff' ></i>
                        <p>312</p>
                    </div>
                    <div class="second">
                        <i class='bx bx-check-double' style='color:#ffffff' ></i>
                        <p>48</p>
                    </div>
                    <div class="third">
                        <button>
                            <span>Follow<i class='bx bx-plus'></i></span>
                        </button>
                    </div>
                </div>

            </div>

        </div>

    </div>



</body>
</html>

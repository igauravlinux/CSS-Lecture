<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Css</title>

    <style>

        h1{
            color: darkblue;
            font-family: "Poppins thin";
        }

        .container{
            width: 100%;
            height: 500px;
            background-color: seagreen;
            position: relative;
        }

        .ball{
            position: absolute;
            bottom: 0;
            height: 100px;
            width: 100px;
            background-color:darkblue;
            border-radius: 50%;
            animation: move 2s ease 1s infinite;
        }

        @keyframes move {
            0%{
                transform: translatey(-180px);
            }
            25%{
                transform: translateX(70px);                
            }

            50%{
                transform: translatey(-280px);
            }

            80%{

            }
            100%{

            }
        }

    </style>

</head>
<body>

    <h1>hey there</h1>


    <div class="container">
    <div class="ball"></div>

    </div>






    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Css</title>

    <style>

        h1{
            color: darkblue;
            font-family: "Poppins thin";
        }

        .container{
            width: 100%;
            height: 500px;
            background-color: seagreen;
            position: relative;
        }

        .ball{
            position: absolute;
            bottom: 0;
            height: 100px;
            width: 100px;
            background-color:darkblue;
            border-radius: 50%;
            animation: move 3s linear 1s infinite;
        }

        @keyframes move {
            0%{
                transform: translate(0 , 0);
            }
            20%{
                /* first jump */
                transform: translate(150px , -200px);
            }
            40%{ 
                transform: translate(300px, 0);
            }

            55%{
                transform: translate(420px , -120px);
            }
            70%{
                transform: translate(540px , 0);
            }
            80%{
                transform: translate(660px , -60px);
            }
            100%{
                transform: translate(790px , 0);
            }
        }

    </style>

</head>
<body>

    <h1>hey there</h1>


    <div class="container">
    <div class="ball"></div>

    </div>






    
</body>
</html>
